[package]
name = "guestbook"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = "0.8"
tokio = { version = "1", features = ["full"] }
teloxide = { version = "0.13", features = ["macros"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
dotenvy = "0.15"
uuid = { version = "1", features = ["v4"] }
chrono = "0.4"
tracing = "0.1"
tracing-subscriber = "0.3"

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
tempfile = "3"
